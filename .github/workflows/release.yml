name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build GUI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  build-cli-arm64:
    name: Build CLI (ARM64 Linux - Raspberry Pi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation toolchain + ARM64 libs
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y libdbus-1-dev:arm64 pkg-config

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-aarch64-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build meshcore-cli for ARM64
        run: cargo build --release --target aarch64-unknown-linux-gnu --package meshcore-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: 1

      - name: Build meshcore-cli for x86_64 (Linux)
        run: cargo build --release --package meshcore-cli

      - name: Package ARM64 .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p deb/DEBIAN deb/usr/bin
          cp target/aarch64-unknown-linux-gnu/release/meshcore-cli deb/usr/bin/
          cat > deb/DEBIAN/control << CTRL
          Package: meshcore-cli
          Version: ${VERSION}
          Section: comm
          Priority: optional
          Architecture: arm64
          Maintainer: Michel Dessenne
          Description: MeshCore CLI for LoRa mesh networks
           Command-line tool for communicating with MeshCore devices
           via Serial, TCP or BLE. Designed for headless Raspberry Pi.
          CTRL
          dpkg-deb --build deb meshcore-cli_${VERSION}_arm64.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-arm64
          path: |
            meshcore-cli_*_arm64.deb
            target/aarch64-unknown-linux-gnu/release/meshcore-cli
            target/release/meshcore-cli

  release:
    name: Create Release
    needs: [build, build-cli-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename CLI binaries for clarity
        run: |
          cd artifacts/cli-arm64
          if [ -f "target/aarch64-unknown-linux-gnu/release/meshcore-cli" ]; then
            cp target/aarch64-unknown-linux-gnu/release/meshcore-cli meshcore-cli_arm64
          fi
          if [ -f "target/release/meshcore-cli" ]; then
            cp target/release/meshcore-cli meshcore-cli_x86_64
          fi

      - name: Display artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/cli-arm64/meshcore-cli_arm64
            artifacts/cli-arm64/meshcore-cli_x86_64
          generate_release_notes: true
          draft: false
          prerelease: false
